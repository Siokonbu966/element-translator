name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build with Flake environment
        run: |
          nix develop --command bash -c "
            pnpm install --frozen-lockfile
            pnpm run build
          "

      - name: Zip Firefox extension
        run: zip -r element-translator-firefox.zip dist/firefox/

      - name: Zip Chrome extension
        run: zip -r element-translator-chrome.zip dist/chrome/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            element-translator-firefox.zip
            element-translator-chrome.zip
          generate_release_notes: true
